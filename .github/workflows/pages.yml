name: Deploy Codelab to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Audit documentation
        run: python3 scripts/audit_docs.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Assemble static site
        run: |
          install -d _site/samples/remote-state-lab/raw
          cp -R codelab _site/codelab
          cp -R reference _site/reference
          cp -R samples/remote-state-lab/raw/verification _site/samples/remote-state-lab/raw/verification
          cp site/index.html _site/index.html
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
